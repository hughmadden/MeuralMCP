server {
    listen 443 ssl http2;
    server_name meural-mcp.example.test;

    ssl_certificate /etc/letsencrypt/live/meural-mcp.example.test/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meural-mcp.example.test/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8733;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
